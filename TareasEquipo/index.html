<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TareasEquipo — Gestión de Proyectos</title>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

  <header class="app-header">
    <a href="../index.html" style="color:inherit;text-decoration:none;opacity:.7;font-size:.85rem;white-space:nowrap;margin-right:var(--space-md)">← Volver</a>
    <div class="app-header__brand">
      <span class="app-header__brand-icon">📋</span>
      <span>TareasEquipo</span>
    </div>
    <div style="display:flex;align-items:center;gap:var(--space-sm)">
      <button class="btn btn--ghost" id="btnConfig">⚙️ Configurar</button>
    </div>
  </header>

  <nav class="app-tabs">
    <button class="app-tab app-tab--active" data-view="viewDashboard">📊 Dashboard</button>
    <button class="app-tab" data-view="viewKanban">📋 Proyectos</button>
  </nav>

  <!-- ===== DASHBOARD ===== -->
  <section class="app-view app-view--active" id="viewDashboard">
    <div class="dashboard-grid">
      <div class="card">
        <div class="card__label">Proyectos</div>
        <div class="card__value" style="color:var(--color-primary)" id="totalProyectos">0</div>
      </div>
      <div class="card">
        <div class="card__label">Tareas Totales</div>
        <div class="card__value" style="color:var(--color-alta)" id="totalTareas">0</div>
      </div>
      <div class="card">
        <div class="card__label">Miembros</div>
        <div class="card__value" style="color:var(--color-success)" id="totalMiembros">0</div>
      </div>
    </div>

    <div class="dashboard-projects" id="projectsGrid"></div>
  </section>

  <!-- ===== KANBAN ===== -->
  <section class="app-view" id="viewKanban">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-md);flex-wrap:wrap;gap:var(--space-sm)">
      <button class="btn btn--primary" id="btnNuevaTarea">+ Nueva Tarea</button>
    </div>

    <div class="project-selector">
      <button class="btn btn--secondary btn--sm" id="kanbanPrev">◀</button>
      <span class="project-selector__name" id="kanbanProyectoName">—</span>
      <button class="btn btn--secondary btn--sm" id="kanbanNext">▶</button>
    </div>

    <div class="kanban-board" id="kanbanBoard"></div>
  </section>

  <!-- ===== MODAL: TAREA ===== -->
  <div class="modal-overlay" id="taskFormOverlay">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title" id="taskFormTitle">Nueva Tarea</h2>
        <button class="btn btn--secondary btn--sm" id="taskFormCancel">✕</button>
      </div>
      <form class="modal__body" id="taskForm">
        <div class="form-group">
          <label class="form-label" for="taskTitulo">Título *</label>
          <input class="form-input" type="text" id="taskTitulo" placeholder="Ej: Diseñar landing page" maxlength="150" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="taskDescripcion">Descripción</label>
          <textarea class="form-textarea" id="taskDescripcion" placeholder="Detalles de la tarea..." maxlength="500"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="taskProyecto">Proyecto *</label>
            <select class="form-select" id="taskProyecto" required></select>
          </div>
          <div class="form-group">
            <label class="form-label" for="taskMiembro">Asignado a</label>
            <select class="form-select" id="taskMiembro"></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="taskEstado">Estado</label>
            <select class="form-select" id="taskEstado"></select>
          </div>
          <div class="form-group">
            <label class="form-label" for="taskPrioridad">Prioridad</label>
            <select class="form-select" id="taskPrioridad"></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="taskFechaInicio">Fecha de inicio</label>
            <input class="form-input" type="date" id="taskFechaInicio" />
          </div>
          <div class="form-group">
            <label class="form-label" for="taskFechaLimite">Fecha límite</label>
            <input class="form-input" type="date" id="taskFechaLimite" />
          </div>
        </div>
        <div class="modal__footer" style="padding:var(--space-md) 0 0">
          <button type="button" class="btn btn--secondary" id="taskFormCancel2">Cancelar</button>
          <button type="submit" class="btn btn--primary" id="taskFormSubmit">Crear Tarea</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== MODAL: CONFIGURACIÓN ===== -->
  <div class="modal-overlay modal--config" id="configOverlay">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title">Configuración</h2>
        <button class="btn btn--secondary btn--sm" id="configCancel">✕</button>
      </div>
      <div class="modal__body">
        <div class="config-tabs">
          <button class="config-tab config-tab--active" data-panel="panelProyectos">📁 Proyectos</button>
          <button class="config-tab" data-panel="panelMiembros">👥 Miembros</button>
        </div>

        <!-- Panel: Proyectos -->
        <div class="config-panel config-panel--active" id="panelProyectos">
          <form id="proyectoForm" style="display:flex;gap:var(--space-sm);flex-wrap:wrap;margin-bottom:var(--space-md)">
            <input class="form-input" type="text" id="proyNombre" placeholder="Nombre del proyecto" style="flex:1;min-width:150px" required />
            <input class="form-input" type="text" id="proyDescripcion" placeholder="Descripción" style="flex:1;min-width:150px" />
            <button type="submit" class="btn btn--primary btn--sm" id="proyectoFormSubmit">Agregar</button>
          </form>
          <div id="proyectosList"></div>
        </div>

        <!-- Panel: Miembros -->
        <div class="config-panel" id="panelMiembros">
          <form id="miembroForm" style="display:flex;gap:var(--space-sm);flex-wrap:wrap;margin-bottom:var(--space-md)">
            <input class="form-input" type="text" id="miemNombre" placeholder="Nombre del miembro" style="flex:1;min-width:150px" required />
            <input class="form-input" type="text" id="miemRol" placeholder="Rol (ej: Frontend)" style="flex:1;min-width:120px" />
            <button type="submit" class="btn btn--primary btn--sm" id="miembroFormSubmit">Agregar</button>
          </form>
          <div id="miembrosList"></div>
        </div>
      </div>
      <div class="modal__footer">
        <button class="btn btn--secondary" id="configCancel2">Cerrar</button>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/store.js"></script>
  <script src="js/models.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/kanban.js"></script>
  <script src="js/taskForm.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
